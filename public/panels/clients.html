<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;">
  <h2 style="font-size:18px;font-weight:700;">&#128101; Auditoría de Clientes</h2>
  <input id="clientSearch" type="text" placeholder="Buscar por teléfono o nombre..." style="width:240px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--bg);color:var(--text);">
  <span id="clientCount" style="font-size:12px;color:var(--text-light);"></span>
</div>
<div id="clientsBody" style="flex:1;display:flex;min-height:0;">
  <div id="clientList" style="width:320px;overflow-y:auto;border-right:1px solid var(--border);flex-shrink:0;"></div>
  <div id="clientThread" style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div id="clientThreadHeader" style="padding:14px 20px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;flex-shrink:0;background:var(--card);"></div>
    <div id="clientMessages" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;"></div>
    <div id="clientReplyArea" style="display:none;padding:12px 20px;border-top:1px solid var(--border);gap:10px;align-items:flex-end;background:var(--card);">
      <textarea id="clientReplyInput" rows="2" placeholder="Escribe tu respuesta..." style="flex:1;resize:none;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;outline:none;background:var(--bg);color:var(--text);min-height:44px;"></textarea>
      <button id="clientReplyBtn" style="background:var(--accent);border:none;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Enviar</button>
    </div>
  </div>
</div>
