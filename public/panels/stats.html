<h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">&#128202; Estadísticas</h2>
<div id="statsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px;"></div>
<div id="statsCharts" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
  <div style="background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px;">Planificaciones por mes</h3>
    <div id="convChart" style="height:120px;display:flex;align-items:end;gap:4px;"></div>
  </div>
  <div style="background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px;">Asistencia</h3>
    <div id="attendChart" style="height:120px;display:flex;align-items:end;gap:4px;"></div>
  </div>
</div>
