<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
  <h2 style="font-size:18px;font-weight:700;">&#128197; Horario de Clases</h2>
  <button id="addScheduleBtn" style="background:var(--primary);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">+ Agregar</button>
</div>
<div style="overflow-x:auto;">
  <table style="width:100%;border-collapse:collapse;font-size:13px;">
    <thead><tr style="background:var(--card);">
      <th style="padding:8px;border:1px solid var(--border);text-align:left;">Hora</th>
      <th style="padding:8px;border:1px solid var(--border);">Lun</th>
      <th style="padding:8px;border:1px solid var(--border);">Mar</th>
      <th style="padding:8px;border:1px solid var(--border);">Mié</th>
      <th style="padding:8px;border:1px solid var(--border);">Jue</th>
      <th style="padding:8px;border:1px solid var(--border);">Vie</th>
    </tr></thead>
    <tbody id="scheduleBody"></tbody>
  </table>
</div>
