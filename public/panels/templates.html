<h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">&#128203; Plantillas pre-hechas</h2>
<p style="font-size:13px;color:var(--text-light);margin-bottom:16px;">Selecciona una plantilla y la cargaremos en el chat para personalizarla.</p>
<div id="templatesList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px;"></div>

<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;">
  <button class="qa-btn" data-type="rubric" style="background:#fce7f3;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:#9d174d;cursor:pointer;">&#9989; Rúbrica</button>
  <button id="examBtn2" style="background:#fef3c7;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:#92400e;cursor:pointer;">&#128221; Examen</button>
  <button id="projectBtn2" style="background:#d1fae5;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:#065f46;cursor:pointer;">&#128209; Proyecto</button>
  <button id="adecuacionBtn2" style="background:#f3e8ff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:#7c3aed;cursor:pointer;">&#127891; Adecuación</button>
</div>

<div style="border-top:2px solid var(--border);padding-top:20px;margin-top:8px;">
  <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;">&#128209; Recursos</h3>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
    <button id="uploadRefBtn2" style="background:var(--accent);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">&#128196; Subir referencia PDF</button>
    <button id="importPlanBtn2" style="background:#7c3aed;border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">&#128229; Importar planificación</button>
    <button id="exportZipBtn2" style="background:#64748b;border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">&#128451; Respaldo ZIP</button>
  </div>
  <div style="font-size:12px;font-weight:600;color:var(--text-light);text-transform:uppercase;margin-bottom:6px;">Referencias PDF</div>
  <div id="refList" style="font-size:13px;color:var(--text-light);"></div>
</div>
